name: Milestone Cleanup

# W-PROTO-6 — automação da fase de higiene pós-merge.
#
# Dispara no merge de qualquer PR para `main`. O milestone alvo é
# identificado pelo estado do ROADMAP (join pelo número da PR contra
# épicos em `🔀 Em revisão`), não pelo nome da branch (W-PROTO-17 —
# branches do harness `claude/*` nunca casavam `milestone/*`).
# Carrega `skills/cleanup/skill.md` via Action oficial Claude Code da Anthropic
# e aplica enxugamento + transição de estado nos ROADMAPs afetados.
#
# Pré-requisito operacional: secret ANTHROPIC_API_KEY configurado em
# Settings → Secrets and variables → Actions.
#
# Modo A (preferido): commit direto em main.
# Modo B (fallback automático se branch protection bloquear): PR secundária
# via peter-evans/create-pull-request.
#
# Para rodar manualmente (debug ou re-run de uma execução falha), use o
# trigger `workflow_dispatch` abaixo passando os três inputs.

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      milestone_id:
        description: "ID do milestone (ex.: PROTO-WORKFLOW-ENCERRAMENTO)"
        required: true
        type: string
      merged_pr_url:
        description: "URL da PR mergeada"
        required: true
        type: string
      merge_sha:
        description: "SHA do merge commit"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    # Roda em qualquer PR mergeada para main (e em workflow_dispatch). A
    # decisão "é PR de milestone?" acontece depois, no passo de resolução
    # via ROADMAP — milestone não resolvido pula os passos de cleanup.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main (full history)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python (resolução do milestone)
        if: github.event_name == 'pull_request'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # W-PROTO-17: identifica o milestone pelo estado do ROADMAP, casando os
      # épicos em 🔀 cujo `PR #N` é o número desta PR. Saída vazia = não é PR
      # de milestone → os passos de cleanup abaixo são pulados.
      - name: Resolver milestone do PR mergeado (via ROADMAP)
        id: resolve
        if: github.event_name == 'pull_request'
        run: |
          pip install --quiet pyyaml
          MILESTONE_ID=$(python -m tools.workflow_platform.cleanup_trigger "${{ github.event.pull_request.number }}")
          echo "milestone_id=$MILESTONE_ID" >> "$GITHUB_OUTPUT"
          if [ -z "$MILESTONE_ID" ]; then
            echo "PR #${{ github.event.pull_request.number }} não casa épico em 🔀 — não é PR de milestone. Pulando cleanup."
          else
            echo "Milestone resolvido pelo ROADMAP: $MILESTONE_ID"
          fi

      - name: Extrair variáveis do contexto
        id: vars
        if: github.event_name == 'workflow_dispatch' || steps.resolve.outputs.milestone_id != ''
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MILESTONE_ID="${{ inputs.milestone_id }}"
            MERGED_PR_URL="${{ inputs.merged_pr_url }}"
            MERGE_SHA="${{ inputs.merge_sha }}"
          else
            # MILESTONE_ID vem do passo de resolução via ROADMAP (W-PROTO-17),
            # não mais do nome da branch.
            MILESTONE_ID="${{ steps.resolve.outputs.milestone_id }}"
            MERGED_PR_URL="${{ github.event.pull_request.html_url }}"
            MERGE_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          fi
          echo "milestone_id=$MILESTONE_ID" >> "$GITHUB_OUTPUT"
          echo "merged_pr_url=$MERGED_PR_URL" >> "$GITHUB_OUTPUT"
          echo "merge_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"
          echo "MILESTONE_ID=$MILESTONE_ID" >> "$GITHUB_ENV"
          echo "MERGED_PR_URL=$MERGED_PR_URL" >> "$GITHUB_ENV"
          echo "MERGE_SHA=$MERGE_SHA" >> "$GITHUB_ENV"

      - name: Configurar git
        if: steps.vars.outputs.milestone_id != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Carrega Claude Code via Action oficial da Anthropic.
      # Nome/versão exatos: confirmar no marketplace antes do primeiro run real.
      # Candidatos no momento do refinamento (W-PROTO-6, 2026-04-24):
      # - anthropics/claude-code-action@v1
      # - anthropics/claude-code-base-action@v1
      - name: Run cleanup skill via Claude Code
        id: claude
        if: steps.vars.outputs.milestone_id != ''
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Carregue e siga integralmente skills/cleanup/skill.md.

            Variáveis de contexto:
            - MILESTONE_ID=${{ steps.vars.outputs.milestone_id }}
            - MERGED_PR_URL=${{ steps.vars.outputs.merged_pr_url }}
            - MERGE_SHA=${{ steps.vars.outputs.merge_sha }}

            Aplique enxugamento dos épicos do milestone e transição de estado
            nos ROADMAPs afetados. Não toque em nenhum arquivo fora de
            ROADMAP.md. Aborte se houver gates abertos ou Extração pendente
            no current_implementation.md mergeado.

            Não commite nem pushe — esta etapa apenas edita os arquivos
            localmente. O passo seguinte do workflow resolve o staging,
            commit e push (modo A direto em main, modo B PR secundária se
            branch protection bloquear).

      - name: Tentar commit direto em main (modo A)
        id: mode_a
        if: steps.vars.outputs.milestone_id != ''
        continue-on-error: true
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "Sem alterações — skill foi no-op (idempotência)."
            exit 0
          fi
          git add -A "*ROADMAP.md"
          git commit -m "chore(cleanup): faxina pós-merge ${MILESTONE_ID}

          Aplicado por skills/cleanup/skill.md via .github/workflows/milestone-cleanup.yml.

          PR original: ${MERGED_PR_URL}
          Merge SHA: ${MERGE_SHA}"
          git push origin main

      - name: Fallback modo B — PR secundária (se modo A falhou)
        if: steps.vars.outputs.milestone_id != '' && steps.mode_a.outcome == 'failure' && steps.mode_a.outputs.no_changes != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: cleanup/${{ steps.vars.outputs.milestone_id }}-${{ github.run_id }}
          base: main
          title: "chore(cleanup): faxina pós-merge ${{ steps.vars.outputs.milestone_id }}"
          body: |
            Cleanup automático pós-merge gerado por
            `.github/workflows/milestone-cleanup.yml` (modo B — branch
            protection bloqueou commit direto em main).

            - Milestone: `${{ steps.vars.outputs.milestone_id }}`
            - PR original: ${{ steps.vars.outputs.merged_pr_url }}
            - Merge SHA: `${{ steps.vars.outputs.merge_sha }}`

            Aprovar e mergear (auto-merge se habilitado).
          commit-message: |
            chore(cleanup): faxina pós-merge ${{ steps.vars.outputs.milestone_id }}

            Aplicado por skills/cleanup/skill.md via .github/workflows/milestone-cleanup.yml.

            PR original: ${{ steps.vars.outputs.merged_pr_url }}
            Merge SHA: ${{ steps.vars.outputs.merge_sha }}

      # Custo por run — best-effort. Action expõe `execution_file` (JSONL com
      # tokens por chamada da API); somamos input_tokens/output_tokens e
      # gravamos uma linha em docs/process/workflow/cleanup_runs.jsonl. Custo
      # em USD não é calculado aqui (preço por modelo muda); tokens crus +
      # contexto são suficientes para análise ad-hoc. Falha de parse não
      # interrompe o workflow (continue-on-error).
      - name: Capturar tokens do run (best-effort)
        id: cost_log
        if: always() && steps.vars.outputs.milestone_id != ''
        continue-on-error: true
        run: |
          EXEC_FILE="${{ steps.claude.outputs.execution_file }}"
          if [ -z "$EXEC_FILE" ] || [ ! -f "$EXEC_FILE" ]; then
            echo "execution_file ausente ou inacessível — pulando log de custo."
            exit 0
          fi
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          STATS=$(jq -s -c '
            [.. | objects | select(has("input_tokens") or has("output_tokens") or (.usage? | type == "object"))] |
            {
              input_tokens:  ([.[] | (.input_tokens  // .usage.input_tokens  // 0)] | add),
              output_tokens: ([.[] | (.output_tokens // .usage.output_tokens // 0)] | add),
              api_calls: length
            }
          ' "$EXEC_FILE" 2>/dev/null) || STATS='{"input_tokens":null,"output_tokens":null,"api_calls":null}'
          mkdir -p docs/process/workflow
          jq -c -n \
            --arg ts "$TIMESTAMP" \
            --arg mid "${MILESTONE_ID}" \
            --arg pr "${MERGED_PR_URL}" \
            --arg run "${{ github.run_id }}" \
            --arg outcome "${{ steps.mode_a.outcome }}" \
            --argjson stats "$STATS" \
            '{timestamp:$ts, milestone_id:$mid, pr:$pr, run_id:$run, mode_a_outcome:$outcome} + $stats' \
            >> docs/process/workflow/cleanup_runs.jsonl
          echo "Linha appendada em docs/process/workflow/cleanup_runs.jsonl:"
          tail -n 1 docs/process/workflow/cleanup_runs.jsonl

      - name: Commitar log de custo em main
        if: always() && steps.vars.outputs.milestone_id != '' && steps.cost_log.outcome == 'success'
        continue-on-error: true
        run: |
          if git diff --quiet -- docs/process/workflow/cleanup_runs.jsonl; then
            echo "Sem mudanças no log de custo — nada a commitar."
            exit 0
          fi
          # Sincroniza com main antes de pushar (mode_a já pode ter pushado).
          git pull --rebase origin main || true
          git add docs/process/workflow/cleanup_runs.jsonl
          git commit -m "chore(cleanup): log run ${{ github.run_id }} (${MILESTONE_ID})"
          git push origin main

      - name: Resumo da execução
        if: always() && steps.vars.outputs.milestone_id != ''
        run: |
          echo "=== Cleanup ${MILESTONE_ID} ==="
          echo "PR original: ${MERGED_PR_URL}"
          echo "Modo A status: ${{ steps.mode_a.outcome }}"
          echo "No changes (idempotência): ${{ steps.mode_a.outputs.no_changes }}"
          echo "Cost log status: ${{ steps.cost_log.outcome }}"
