model_list:
  # Claude Code envia model_name comecando com "claude-". O wildcard captura
  # todos e roteia para o OpenWebUI da Atlantico via protocolo OpenAI.
  # LiteLLM traduz Anthropic <-> OpenAI internamente (tool calls inclusive).
  - model_name: "claude-*"
    litellm_params:
      model: "openai/ollama/ministral-3:14b"
      api_base: os.environ/OPENWEBUI_BASE_URL
      api_key: os.environ/OPENWEBUI_API_KEY
      # drop_params global nao pega params novos do Claude Code (context_management,
      # cache_control etc) quando o LiteLLM detecta backend ollama pelo nome do modelo.
      # Lista explicita aqui resolve.
      drop_params: true
      additional_drop_params:
        - context_management
        - cache_control
        - thinking
        - anthropic_beta

litellm_settings:
  drop_params: true
  request_timeout: 300
  num_retries: 0
  # OpenWebUI retorna 'Server' duplicado no header da resposta. O transport
  # aiohttp (default no LiteLLM moderno) eh estrito e quebra com
  # `aiohttp.http_exceptions.BadHttpMessage: Duplicate 'Server' header found`.
  # Desligando, o LiteLLM cai no httpx puro, que tolera.
  disable_aiohttp_transport: true
